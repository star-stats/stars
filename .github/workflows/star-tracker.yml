name: Track Stars

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      -
        name: Track
        uses: fbuireu/github-star-tracker@v1
        with:
          include-forks: true
          github-token: ${{ secrets.STAR_TRACKER_TOKEN }}
