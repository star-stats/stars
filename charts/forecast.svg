      stroke-dasharray: 511;
      stroke-dashoffset: 511;
      animation: drawLine 2s ease-out forwards;
    }
    .data-point {
      opacity: 0;
      animation: fadeInPoint 0.5s ease-out forwards;
    }
    .chart-bg { fill: #fff; }
    .chart-text { fill: #24292e; }
    .chart-muted { fill: #6a737d; }
    .chart-grid { stroke: #eee; }
